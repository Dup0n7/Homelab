name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "Site/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # GitHub-hosted runner, not the self-hosted one on automation01 - this
    # job only packages and publishes static files to GitHub's own Pages
    # infrastructure, it never touches the homelab network.
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
