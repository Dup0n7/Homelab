# Ansible runs FROM automation01 (see Docs/Ansible.md for why), so
# automation01 manages itself via a local connection - no SSH needed.
#
# plex01/truenas01 are NOT yet reachable from here: automation01 has no SSH
# keypair of its own (only accepts incoming connections from the Windows
# workstation), so cross-host management needs that set up first. Add them
# here once that's done - see Docs/Ansible.md "Open questions".

[docker_hosts]
automation01 ansible_connection=local

[docker_hosts:vars]
ansible_python_interpreter=/usr/bin/python3
