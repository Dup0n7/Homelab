# Ansible runs FROM automation01 (see Docs/Ansible.md for why).
# automation01 manages itself via a local connection - no SSH needed.
#
# plex01 is managed over SSH using a dedicated key generated on automation01
# (~/.ssh/ansible_ed25519, not the Windows workstation's key) and authorized
# on plex01 - see Docs/Ansible.md "Cross-host management".
#
# truenas01 is still not Ansible-managed - see Docs/Ansible.md "Open questions".
#
# k3s-master01 is a separate group (not docker_hosts) - it's a Kubernetes
# node, not a Docker Compose host, provisioned by Terraform with
# automation01's ansible key baked in at creation (see Terraform/proxmox/k3s-master01.tf)
# rather than retrofitted like plex01. See Docs/Kubernetes.md.

[docker_hosts]
automation01 ansible_connection=local
plex01 ansible_host=192.168.1.50 ansible_user=kyle ansible_ssh_private_key_file=~/.ssh/ansible_ed25519

[docker_hosts:vars]
ansible_python_interpreter=/usr/bin/python3

[k3s_hosts]
k3s-master01 ansible_host=192.168.1.60 ansible_user=kyle ansible_ssh_private_key_file=~/.ssh/ansible_ed25519

[k3s_hosts:vars]
ansible_python_interpreter=/usr/bin/python3
