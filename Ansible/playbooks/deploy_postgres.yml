---
# First real Ansible playbook for this lab. Deploys the PostgreSQL container
# already declared in Docker/Postgres/docker-compose.yml, sourcing its
# password from Ansible Vault instead of a plaintext .env checked in by
# hand. Data lives on truenas01 (tank/postgres, NFS-mounted) rather than a
# local Docker volume - same pattern as plex01's media mount. See
# Docs/Ansible.md for the full walkthrough and why Postgres was chosen as
# the first target.
- name: Deploy PostgreSQL on automation01
  hosts: automation01
  become: false

  tasks:
    - name: Confirm Docker is present (this playbook does not install Docker)
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Show Docker version found
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"

    - name: Ensure nfs-common is installed
      ansible.builtin.apt:
        name: nfs-common
        state: present
      become: true

    - name: Ensure the NFS mount point exists
      ansible.builtin.file:
        path: "{{ postgres_nfs_mount }}"
        state: directory
        mode: "0755"
      become: true

    - name: Mount tank/postgres from truenas01 (persistent - same pattern as plex01's media mount)
      ansible.posix.mount:
        path: "{{ postgres_nfs_mount }}"
        src: "192.168.1.40:/mnt/tank/postgres"
        fstype: nfs
        opts: _netdev,nofail
        state: mounted
      become: true

    - name: Verify the NFS mount is actually active (otherwise Postgres would silently write to local disk)
      ansible.builtin.command: mountpoint -q {{ postgres_nfs_mount }}
      changed_when: false

    - name: Write Postgres .env from the vault-encrypted password
      ansible.builtin.template:
        src: ../templates/postgres.env.j2
        dest: "{{ postgres_compose_dir }}/.env"
        mode: "0600"

    - name: Start the Postgres container via Docker Compose
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ postgres_compose_dir }}"
      register: compose_result
      changed_when: "'Started' in compose_result.stderr or 'Created' in compose_result.stderr or 'Running' in compose_result.stderr"

    - name: Wait for Postgres to accept connections
      ansible.builtin.command: docker exec postgres pg_isready -U {{ postgres_user }}
      register: pg_ready
      until: pg_ready.rc == 0
      retries: 10
      delay: 3
      changed_when: false
