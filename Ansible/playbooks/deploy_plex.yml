---
# Second Ansible target, first one reached over real SSH rather than
# ansible_connection=local (see Docs/Ansible.md "Cross-host management").
# Deploys the Plex + Portainer Agent stack already declared in
# Docker/Media/docker-compose.yml. No secrets involved - unlike Postgres,
# nothing here needs Ansible Vault.
- name: Deploy Plex on plex01
  hosts: plex01
  become: false

  tasks:
    - name: Confirm Docker is present (this playbook does not install Docker)
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Show Docker version found
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"

    - name: Ensure nfs-common is installed
      ansible.builtin.apt:
        name: nfs-common
        state: present
      become: true

    - name: Ensure the NFS mount point exists
      ansible.builtin.file:
        path: "{{ media_nfs_mount }}"
        state: directory
        mode: "0755"
      become: true

    - name: Mount tank/media from truenas01 (persistent)
      ansible.posix.mount:
        path: "{{ media_nfs_mount }}"
        src: "{{ media_nfs_src }}"
        fstype: nfs
        opts: _netdev,nofail
        state: mounted
      become: true

    - name: Verify the NFS mount is actually active
      ansible.builtin.command: mountpoint -q {{ media_nfs_mount }}
      changed_when: false

    - name: Start the Plex stack via Docker Compose
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ plex_compose_dir }}"
      register: compose_result
      changed_when: "'Started' in compose_result.stderr or 'Created' in compose_result.stderr or 'Running' in compose_result.stderr"
